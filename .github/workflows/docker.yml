name: Build and Push Container Base

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push to GHCR'
        required: false
        default: 'true'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push_image != 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/prophetse7en/container-base
          # Tagging strategy:
          #   - push to main         → 'dev' tag
          #   - tag vX.Y.Z           → 'vX.Y.Z' + 'vX.Y' + 'vX' + 'latest' + 'alpine-3.21'
          #   - workflow_dispatch    → 'sha-<short-sha>' (manual/testing runs)
          tags: |
            type=ref,event=branch,enable={{is_default_branch}},value=dev
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=alpine-3.21,enable=${{ github.ref_type == 'tag' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
